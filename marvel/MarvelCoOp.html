<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

        :root {
            --hud-primary: #38bdf8;
            --hud-accent: #fbbf24;
            --hud-bg: rgba(15, 23, 42, 0.7);
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; color: var(--hud-primary); }
        canvas { display: block; }

        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--hud-bg);
            padding: 20px;
            border-radius: 4px;
            backdrop-filter: blur(8px);
            border: 1px solid var(--hud-primary);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            z-index: 100;
            text-align: right;
            min-width: 250px;
        }

        #ui::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; width: 10px; height: 10px;
            border-top: 2px solid var(--hud-accent);
            border-left: 2px solid var(--hud-accent);
        }

        .character-name { font-weight: bold; font-size: 1.2rem; color: #fff; text-shadow: 0 0 10px var(--hud-primary); margin-bottom: 10px; }
        .controls { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; opacity: 0.8; margin-top: 10px; line-height: 1.4; color: var(--hud-primary); }
        
        .switch-btn { 
            background: rgba(56, 189, 248, 0.1); border: 1px solid var(--hud-primary); 
            padding: 8px 15px; border-radius: 4px; color: var(--hud-primary);
            font-weight: bold; cursor: pointer; margin-top: 10px; transition: all 0.3s;
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
            width: 100%;
        }
        .switch-btn:hover { background: var(--hud-primary); color: #000; box-shadow: 0 0 15px var(--hud-primary); }

        #stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--hud-bg);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid var(--hud-primary);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--hud-accent); }
        .stat-value { font-family: 'Share Tech Mono', monospace; font-size: 1.5rem; color: #fff; }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; color: var(--hud-primary); display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 2rem; z-index: 1000; transition: opacity 0.5s;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 200; display: none;
        }
        .joystick-container { position: absolute; bottom: 50px; left: 50px; width: 150px; height: 150px; pointer-events: auto; }
        .joystick-base { position: absolute; width: 120px; height: 120px; background: rgba(56, 189, 248, 0.1); border: 2px solid var(--hud-primary); border-radius: 50%; top: 15px; left: 15px; }
        .joystick-knob { position: absolute; width: 60px; height: 60px; background: var(--hud-primary); border-radius: 50%; top: 45px; left: 45px; box-shadow: 0 0 20px var(--hud-primary); }
        
        .action-buttons { position: absolute; bottom: 40px; right: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; pointer-events: auto; }
        .action-btn {
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--hud-primary);
            background: var(--hud-bg); color: var(--hud-primary); font-family: 'Orbitron', sans-serif;
            font-weight: bold; font-size: 0.8rem; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); transition: all 0.2s;
        }
        .action-btn:active { transform: scale(0.9); background: var(--hud-primary); color: #000; }

        @media (max-width: 1000px) {
            #mobile-controls { display: block; }
            #ui, #stats-panel { transform: scale(0.8); top: 10px; }
            #ui { right: 10px; }
            #stats-panel { left: 10px; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div style="margin-bottom: 20px;">INITIALIZING MARVEL 2...</div>
        <div style="font-family: 'Share Tech Mono', monospace; font-size: 1rem; opacity: 0.7;">CONNECTING TO AVENGERS NETWORK...</div>
    </div>

    <div id="stats-panel">
        <div class="stat-item">
            <span class="stat-label">BRICKS COLLECTED</span>
            <span class="stat-value" id="bricks">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">SYSTEM STATUS</span>
            <span class="stat-value" id="integrity" style="font-size: 1rem; color: #4ade80;">NOMINAL</span>
        </div>
        <div class="stat-item" id="scale-hud" style="display: none;">
            <span class="stat-label">HULK MAGNITUDE</span>
            <span class="stat-value" id="hulk-scale-val" style="color: #fbbf24;">1.0x</span>
        </div>
    </div>

    <div id="ui">
        <div id="char-info">
            <div class="stat-label">ACTIVE OPERATIVE</div>
            <div class="character-name" id="p1-display">IRON MAN</div>
            <div class="controls">
                WASD: MOVE | SPACE: JUMP/FLY<br>
                SHIFT: OVERDRIVE | F: SPECIAL
            </div>
            <div id="gamepad-status" style="margin-top: 10px; font-size: 0.6rem; color: #f87171;">NO GAMEPAD DETECTED</div>
            <button class="switch-btn" id="switch-char-btn">SWITCH CHARACTER</button>
        </div>
    </div>
    
    <div id="mobile-controls">
        <div class="joystick-container" id="joystick-zone">
            <div class="joystick-base"></div>
            <div class="joystick-knob" id="joystick-knob"></div>
        </div>
        <div class="action-buttons">
            <button class="action-btn" id="btn-jump">JUMP</button>
            <button class="action-btn" id="btn-special">POWER</button>
            <button class="action-btn" id="btn-switch">SWAP</button>
            <button class="action-btn" id="btn-legion">LEGION</button>
        </div>
    </div>

    <!-- Legacy-Friendly Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
