<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Marvel Mobile Universe - Web Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid #ffcc00;
            user-select: none;
            text-align: right;
            z-index: 100;
            font-size: 0.9rem;
            max-width: 200px;
        }
        .controls { font-size: 0.7rem; opacity: 0.8; margin-top: 5px; }
        .character-name { font-weight: bold; font-size: 1.1rem; color: #ffcc00; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5); }
        .switch-btn { 
            background: #ffcc00; border: none; padding: 8px 15px; border-radius: 10px; 
            font-weight: bold; cursor: pointer; margin-top: 5px; transition: all 0.2s;
            font-size: 0.8rem;
        }
        .switch-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #ffcc00; }
        #stats { position: absolute; top: 10px; left: 10px; color: #fff; font-weight: bold; font-size: 1.2rem; z-index: 100; text-shadow: 2px 2px 4px #000; }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ffcc00; display: flex; justify-content: center; align-items: center;
            font-size: 2rem; z-index: 1000; transition: opacity 0.5s;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
            display: none;
        }
        .joystick-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            pointer-events: auto;
            touch-action: none;
        }
        .joystick-knob {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255, 204, 0, 0.4);
            border: 3px solid #ffcc00;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
            pointer-events: none;
            display: none;
        }
        .action-buttons {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
            touch-action: none;
        }
        .action-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: #ffcc00;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active {
            transform: scale(0.9);
            background: rgba(255, 204, 0, 0.8);
            color: #000;
        }
        .btn-jump { border-color: rgba(0, 204, 255, 0.5); color: #00ccff; }
        .btn-special { border-color: rgba(255, 51, 0, 0.5); color: #ff3300; }
        .btn-legion { border-color: rgba(0, 255, 255, 0.5); color: #00ffff; }

        @media (max-width: 900px) {
            #mobile-controls { display: block; }
            #ui { display: none !important; }
            #stats { font-size: 1rem; }
            .action-btn { width: 65px; height: 65px; font-size: 0.9rem; }
            .action-buttons { gap: 10px; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>
    <div id="loading">טוען משחק לגו מרוול...</div>

    <div id="stats">
        ניקוד לבנים: <span id="bricks">0</span>
    </div>

    <div id="ui">
        <div id="char-info">
            <div class="character-name" id="active-char">איירון מן</div>
            <div class="controls">
                מקשים: WASD לזוז, רווח לקפוץ/לעוף<br>
                Shift לרוץ | <b>F או עכבר: יכולת מיוחדת</b>
            </div>
            <div id="gamepad-status" style="margin-top: 10px; font-size: 0.8rem; color: #ff3333;">🎮 שלט לא מחובר</div>
            <button class="switch-btn" id="switch-char-btn">החלף דמות</button>
        </div>
    </div>
    
    <div id="mobile-controls">
        <div class="joystick-container" id="joystick-zone">
            <div class="joystick-knob" id="joystick-knob"></div>
        </div>
        <div class="action-buttons">
            <button class="action-btn btn-special" id="btn-special">כוח</button>
            <button class="action-btn btn-jump" id="btn-jump">קפיצה</button>
            <button class="action-btn btn-legion" id="btn-legion">👑</button>
            <button class="action-btn" id="btn-switch">החלף</button>
        </div>
    </div>

    <!-- Legacy-Friendly Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
