<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נחש - משחק סנייק פרימיום</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="hud">
            <div class="stat">
                <span class="label">ניקוד:</span>
                <span id="score" class="value">000</span>
            </div>
            <div class="stat">
                <span class="label">שיא:</span>
                <span id="high-score" class="value">000</span>
            </div>
            <div class="stat">
                <span class="label">מהירות:</span>
                <div class="speed-controls">
                    <button class="speed-btn active" data-speed="200" onclick="updateSpeed(200, this)">קל</button>
                    <button class="speed-btn" data-speed="140" onclick="updateSpeed(140, this)">בינוני</button>
                    <button class="speed-btn" data-speed="80" onclick="updateSpeed(80, this)">קשה</button>
                </div>
            </div>
        </div>

        <div id="game-board-wrapper">
            <canvas id="game-canvas"></canvas>
            
            <div id="overlay" class="overlay">
                <div class="overlay-content">
                    <h1 id="overlay-title">משחק סנייק</h1>
                    <p id="overlay-msg">לחץ על הכפתור כדי להתחיל</p>
                    <button id="start-btn">התחל משחק</button>
                    <div class="instructions">
                        <p>השתמש בחצים או במקשי WASD כדי לזוז</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
