<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Power Ranger</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Black', sans-serif;
    overflow: hidden;
  }
  h1 {
    color: #ffd700;
    font-size: 2rem;
    text-shadow: 0 0 20px #ffd700, 0 0 40px #ff9900;
    letter-spacing: 4px;
    margin-bottom: 10px;
    animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { text-shadow: 0 0 10px #ffd700, 0 0 20px #ff9900; }
    to   { text-shadow: 0 0 30px #ffd700, 0 0 60px #ff9900, 0 0 90px #ffcc00; }
  }
  #hud {
    display: flex;
    gap: 30px;
    margin-bottom: 8px;
    color: #ffd700;
    font-size: 1.1rem;
    text-shadow: 0 0 8px #ffd700;
  }
  #powerBar {
    width: 600px;
    height: 14px;
    background: #1a1a2e;
    border: 2px solid #ffd700;
    border-radius: 7px;
    margin-bottom: 8px;
    overflow: hidden;
    box-shadow: 0 0 10px #ffd700;
  }
  #powerFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff9900, #ffd700, #fff700);
    border-radius: 7px;
    transition: width 0.2s;
    box-shadow: 0 0 10px #ffd700;
  }
  #goldRushMsg {
    color: #fff700;
    font-size: 1.5rem;
    font-weight: bold;
    text-shadow: 0 0 20px #ffd700;
    height: 28px;
    margin-bottom: 4px;
    animation: pulse 0.5s ease-in-out infinite alternate;
    opacity: 0;
    transition: opacity 0.3s;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
  canvas {
    border: 2px solid #ffd700;
    border-radius: 8px;
    box-shadow: 0 0 30px #ffd70055;
    display: block;
  }
  #controls {
    color: #888;
    margin-top: 10px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-align: center;
  }
  #controls span { color: #ffd700; }
  #gamepadStatus {
    color: #444;
    font-size: 0.75rem;
    margin-top: 4px;
    letter-spacing: 1px;
    transition: color 0.4s;
  }
  #gamepadStatus.connected { color: #ffd700; text-shadow: 0 0 8px #ffd700; }
</style>
</head>
<body>
<h1>⚡ GOLDEN POWER RANGER ⚡</h1>
<div id="hud">
  <div>SCORE: <span id="score">0</span></div>
  <div>COINS: <span id="coins">0</span></div>
  <div>LEVEL: <span id="level">1</span></div>
</div>
<div id="powerBar"><div id="powerFill"></div></div>
<div id="goldRushMsg">⚡ GOLD RUSH! ⚡</div>
<canvas id="c" width="600" height="480"></canvas>
<div id="controls">
  <span>WASD / Arrows</span> Move &nbsp;|&nbsp; <span>SPACE</span> Gold Rush &nbsp;|&nbsp; <span>Controller</span> Left Stick + A Button
</div>
<div id="gamepadStatus">No gamepad detected — plug in a controller and press any button</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── Audio ───────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resumeAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
window.addEventListener('keydown', resumeAudio, { once: false });
window.addEventListener('gamepadconnected', resumeAudio);

function masterGain(vol = 0.18) {
  const g = audioCtx.createGain();
  g.gain.value = vol;
  g.connect(audioCtx.destination);
  return g;
}

// Coin pickup — sparkling ascending chirp
function playCoinSound(isSuper) {
  const mg = masterGain(isSuper ? 0.22 : 0.15);
  const notes = isSuper
    ? [523, 659, 784, 1047, 1319]
    : [523, 659, 784];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = isSuper ? 'triangle' : 'sine';
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i * (isSuper ? 0.07 : 0.06);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(1, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.connect(gain); gain.connect(mg);
    osc.start(t); osc.stop(t + 0.2);
  });
}

// Level up — triumphant fanfare
function playLevelUp() {
  const mg = masterGain(0.2);
  const melody = [523, 659, 784, 1047, 1319, 1047, 784, 1568];
  melody.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.1;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.6, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.connect(gain); gain.connect(mg);
    osc.start(t); osc.stop(t + 0.2);
  });
  // Bass punch
  const bass = audioCtx.createOscillator();
  const bg = audioCtx.createGain();
  bass.type = 'sawtooth';
  bass.frequency.setValueAtTime(110, audioCtx.currentTime);
  bass.frequency.exponentialRampToValueAtTime(55, audioCtx.currentTime + 0.4);
  bg.gain.setValueAtTime(0.5, audioCtx.currentTime);
  bg.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  bass.connect(bg); bg.connect(mg);
  bass.start(); bass.stop(audioCtx.currentTime + 0.5);
}

// Gold Rush activation — epic power surge
function playGoldRush() {
  const mg = masterGain(0.25);

  // Rising sweep
  const sweep = audioCtx.createOscillator();
  const sg = audioCtx.createGain();
  sweep.type = 'sawtooth';
  sweep.frequency.setValueAtTime(80, audioCtx.currentTime);
  sweep.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.6);
  sg.gain.setValueAtTime(0.8, audioCtx.currentTime);
  sg.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
  sweep.connect(sg); sg.connect(mg);
  sweep.start(); sweep.stop(audioCtx.currentTime + 0.7);

  // Thunder crack — noise burst
  const bufSize = audioCtx.sampleRate * 0.15;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const nf = audioCtx.createBiquadFilter();
  nf.type = 'bandpass'; nf.frequency.value = 800; nf.Q.value = 0.5;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(1, audioCtx.currentTime + 0.1);
  ng.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  noise.connect(nf); nf.connect(ng); ng.connect(mg);
  noise.start(audioCtx.currentTime + 0.1);
  noise.stop(audioCtx.currentTime + 0.45);

  // Power chord stab
  [130, 165, 196, 261].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + 0.55;
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.connect(g); g.connect(mg);
    osc.start(t); osc.stop(t + 0.65);
  });
}

// Gold Rush end — wind-down whoosh
function playGoldRushEnd() {
  const mg = masterGain(0.15);
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.5);
  g.gain.setValueAtTime(0.6, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.55);
  osc.connect(g); g.connect(mg);
  osc.start(); osc.stop(audioCtx.currentTime + 0.6);
}

// Power bar fills up — ready ping
function playPowerReady() {
  const mg = masterGain(0.18);
  [880, 1108, 1318].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.08;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.8, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g); g.connect(mg);
    osc.start(t); osc.stop(t + 0.35);
  });
}

// Footstep tick — subtle
function playStep() {
  const mg = masterGain(0.05);
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 120 + Math.random() * 40;
  g.gain.setValueAtTime(0.4, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
  osc.connect(g); g.connect(mg);
  osc.start(); osc.stop(audioCtx.currentTime + 0.05);
}

// ─── State ────────────────────────────────────────────────────────────────────
let score = 0, coinCount = 0, level = 1;
let power = 0, goldRushActive = false, goldRushTimer = 0;
let powerWasReady = false;
let keys = {};
let particles = [];
let coins = [];
let stars = [];
let frameCount = 0;
let stepTimer = 0;
const goldRushMsg = document.getElementById('goldRushMsg');
const gamepadStatusEl = document.getElementById('gamepadStatus');

// Gamepad button state (prev frame, for edge detection)
let gpPrev = { buttons: [] };

// ─── Player ──────────────────────────────────────────────────────────────────
const player = {
  x: W / 2, y: H / 2,
  w: 36, h: 52,
  vx: 0, vy: 0,
  speed: 3.2,
  facing: 1,
  walkFrame: 0,
  walkTimer: 0,
};

// ─── Gamepad ─────────────────────────────────────────────────────────────────
window.addEventListener('gamepadconnected', e => {
  gamepadStatusEl.textContent = `Gamepad connected: ${e.gamepad.id.slice(0, 40)}`;
  gamepadStatusEl.classList.add('connected');
  resumeAudio();
});
window.addEventListener('gamepaddisconnected', () => {
  gamepadStatusEl.textContent = 'Gamepad disconnected';
  gamepadStatusEl.classList.remove('connected');
});

function readGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  const gp = pads[0];
  if (!gp) return { ax: 0, ay: 0, goldRushPressed: false };

  // Left stick axes (0 = LX, 1 = LY) with deadzone
  const dead = 0.12;
  let ax = Math.abs(gp.axes[0]) > dead ? gp.axes[0] : 0;
  let ay = Math.abs(gp.axes[1]) > dead ? gp.axes[1] : 0;

  // D-pad fallback: buttons 12=up 13=down 14=left 15=right
  if (gp.buttons[14]?.pressed) ax = -1;
  if (gp.buttons[15]?.pressed) ax =  1;
  if (gp.buttons[12]?.pressed) ay = -1;
  if (gp.buttons[13]?.pressed) ay =  1;

  // A button (0) or South button — rising edge only
  const aPressed = gp.buttons[0]?.pressed && !gpPrev.buttons[0];
  gpPrev.buttons[0] = gp.buttons[0]?.pressed ?? false;

  return { ax, ay, goldRushPressed: aPressed };
}

// ─── Coins ───────────────────────────────────────────────────────────────────
function spawnCoin() {
  const margin = 40;
  coins.push({
    x: margin + Math.random() * (W - margin * 2),
    y: margin + Math.random() * (H - margin * 2),
    r: 10,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.08,
    pulse: Math.random() * Math.PI * 2,
    type: Math.random() < 0.2 ? 'super' : 'normal',
  });
}
for (let i = 0; i < 8; i++) spawnCoin();

// ─── Particles ───────────────────────────────────────────────────────────────
function spawnStars(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    stars.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      size: 3 + Math.random() * 5,
      color: color || '#ffd700',
    });
  }
}

function spawnTrail(x, y) {
  particles.push({
    x, y,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -1 - Math.random() * 2,
    life: 1,
    decay: 0.05 + Math.random() * 0.05,
    size: 4 + Math.random() * 6,
    hue: 40 + Math.random() * 20,
  });
}

// ─── Draw Background ─────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#1a1a33';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  if (goldRushActive) {
    const pulse = 0.06 + 0.04 * Math.sin(frameCount * 0.15);
    ctx.fillStyle = `rgba(255, 215, 0, ${pulse})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── Draw Ranger ─────────────────────────────────────────────────────────────
function drawRanger(x, y, facing, walkFrame, isGoldRush) {
  ctx.save();
  ctx.translate(x, y);
  if (facing < 0) ctx.scale(-1, 1);

  const bobY = Math.sin(walkFrame * 0.3) * 2;
  const legSwing = Math.sin(walkFrame * 0.3) * 8;

  if (isGoldRush) {
    const aura = ctx.createRadialGradient(0, 0, 10, 0, 0, 50);
    aura.addColorStop(0, 'rgba(255,215,0,0.4)');
    aura.addColorStop(1, 'rgba(255,150,0,0)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.ellipse(0, 0, 50, 60, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.translate(0, bobY);

  // Legs
  ctx.lineCap = 'round';
  [[-9, -1], [9, 1]].forEach(([tx, dir]) => {
    ctx.save();
    ctx.translate(tx, 18);
    ctx.rotate((dir * legSwing * Math.PI) / 180);
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 20);
    ctx.strokeStyle = '#daa520'; ctx.lineWidth = 8; ctx.stroke();
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-5, 18, 10, 6);
    ctx.fillStyle = '#ffd700'; ctx.fillRect(-5, 18, 10, 2);
    ctx.restore();
  });

  // Body
  const bodyGrad = ctx.createLinearGradient(-14, -18, 14, 18);
  bodyGrad.addColorStop(0, isGoldRush ? '#fff700' : '#ffd700');
  bodyGrad.addColorStop(0.5, '#daa520');
  bodyGrad.addColorStop(1, '#b8860b');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.roundRect(-14, -18, 28, 38, 4); ctx.fill();

  // Chest coin
  ctx.fillStyle = isGoldRush ? '#fff' : '#ff9900';
  ctx.beginPath(); ctx.arc(0, -4, 7, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#fff700'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#ffd700'; ctx.font = 'bold 8px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⚡', 0, -4);

  // Belt
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-14, 15, 28, 5);
  ctx.fillStyle = '#ffd700'; ctx.fillRect(-4, 15, 8, 5);

  // Arms
  const armSwing = Math.sin(walkFrame * 0.3) * 10;
  [[-16, 1], [16, -1]].forEach(([tx, dir]) => {
    ctx.save();
    ctx.translate(tx, -12);
    ctx.rotate((dir * armSwing * Math.PI) / 180);
    ctx.fillStyle = '#daa520';
    ctx.beginPath(); ctx.roundRect(-5, 0, 10, 22, 4); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillRect(-5, 18, 10, 4);
    ctx.restore();
  });

  // Helmet
  const helmGrad = ctx.createLinearGradient(-13, -40, 13, -18);
  helmGrad.addColorStop(0, isGoldRush ? '#fff700' : '#ffd700');
  helmGrad.addColorStop(1, '#b8860b');
  ctx.fillStyle = helmGrad;
  ctx.beginPath(); ctx.roundRect(-13, -42, 26, 26, 6); ctx.fill();

  // Visor
  ctx.fillStyle = isGoldRush ? '#ffe066' : '#222';
  ctx.beginPath(); ctx.ellipse(0, -31, 10, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5; ctx.stroke();

  // Crest
  ctx.fillStyle = '#ff9900';
  ctx.beginPath(); ctx.moveTo(-4, -42); ctx.lineTo(0, -50); ctx.lineTo(4, -42); ctx.fill();

  // Stripe
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -42); ctx.lineTo(0, -18); ctx.stroke();

  ctx.restore();
}

// ─── Draw Coin ───────────────────────────────────────────────────────────────
function drawCoin(coin) {
  coin.pulse += 0.05;
  coin.angle += coin.spin;
  const scale = 0.85 + 0.15 * Math.sin(coin.pulse);
  const glow = coin.type === 'super' ? '#ff6600' : '#ffd700';

  ctx.save();
  ctx.translate(coin.x, coin.y);
  ctx.scale(scale, scale);
  ctx.rotate(coin.angle);

  const g = ctx.createRadialGradient(0, 0, 2, 0, 0, coin.r + 6);
  g.addColorStop(0, glow + 'cc'); g.addColorStop(1, glow + '00');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, coin.r + 6, 0, Math.PI * 2); ctx.fill();

  const cg = ctx.createRadialGradient(-2, -2, 1, 0, 0, coin.r);
  if (coin.type === 'super') {
    cg.addColorStop(0, '#ffcc00'); cg.addColorStop(0.5, '#ff6600'); cg.addColorStop(1, '#cc3300');
  } else {
    cg.addColorStop(0, '#fff700'); cg.addColorStop(0.5, '#ffd700'); cg.addColorStop(1, '#b8860b');
  }
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.arc(0, 0, coin.r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.fillStyle = coin.type === 'super' ? '#fff' : '#b8860b';
  ctx.font = `bold ${coin.type === 'super' ? 10 : 9}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(coin.type === 'super' ? '★' : '⚡', 0, 0);

  ctx.restore();
}

// ─── Update ──────────────────────────────────────────────────────────────────
function activateGoldRush() {
  goldRushActive = true;
  goldRushTimer = 300;
  power = 0;
  goldRushMsg.style.opacity = '1';
  spawnStars(player.x, player.y, 30, '#ffd700');
  spawnStars(player.x, player.y, 20, '#ffffff');
  playGoldRush();
}

function update() {
  frameCount++;

  const { ax, ay, goldRushPressed } = readGamepad();

  // Movement — keyboard takes priority, gamepad fills in
  let moveX = ax, moveY = ay;
  let moving = false;

  if (keys['ArrowLeft']  || keys['a'] || keys['A']) { moveX = -1; }
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) { moveX = 1; }

  if (keys['ArrowUp']   || keys['w'] || keys['W']) { moveY = -1; }
  else if (keys['ArrowDown']  || keys['s'] || keys['S']) { moveY = 1; }

  if (Math.abs(moveX) > 0.05) {
    player.vx = moveX * player.speed;
    player.facing = moveX > 0 ? 1 : -1;
    moving = true;
  } else { player.vx *= 0.7; }

  if (Math.abs(moveY) > 0.05) {
    player.vy = moveY * player.speed;
    moving = true;
  } else { player.vy *= 0.7; }

  if (goldRushActive) { player.vx *= 1.5; player.vy *= 1.5; }

  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x + player.vx));
  player.y = Math.max(player.h / 2 + 10, Math.min(H - 20, player.y + player.vy));

  if (moving) {
    player.walkTimer++;
    player.walkFrame = player.walkTimer;
    if (goldRushActive) spawnTrail(player.x + (Math.random() - 0.5) * 10, player.y + 10);
    stepTimer++;
    if (stepTimer % 18 === 0) playStep();
  } else {
    player.walkFrame = 0;
    player.walkTimer = 0;
  }

  // Gold Rush activation (keyboard or gamepad A button)
  const spacePressed = keys[' '] && !keys._spacePrev;
  keys._spacePrev = keys[' '];
  if ((spacePressed || goldRushPressed) && power >= 100 && !goldRushActive) {
    activateGoldRush();
  }

  if (goldRushActive) {
    goldRushTimer--;
    if (goldRushTimer <= 0) {
      goldRushActive = false;
      goldRushMsg.style.opacity = '0';
      playGoldRushEnd();
    }
  }

  // Power ready ping (rising edge)
  const powerReady = power >= 100 && !goldRushActive;
  if (powerReady && !powerWasReady) playPowerReady();
  powerWasReady = powerReady;

  // Coin collection
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    const dx = player.x - c.x, dy = (player.y - 14) - c.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const collectR = goldRushActive ? 60 : 28;
    if (dist < collectR + c.r) {
      const isSuper = c.type === 'super';
      const pts = isSuper ? 50 : 10;
      score += goldRushActive ? pts * 3 : pts;
      coinCount++;
      const oldPower = power;
      power = Math.min(100, power + (isSuper ? 30 : 12));
      spawnStars(c.x, c.y, isSuper ? 20 : 10, isSuper ? '#ff6600' : '#ffd700');
      playCoinSound(isSuper);
      coins.splice(i, 1);
      spawnCoin();
      if (coinCount % 10 === 0) {
        level++;
        for (let j = 0; j < 3; j++) spawnCoin();
        spawnStars(player.x, player.y, 40, '#ffd700');
        playLevelUp();
      }
      updateHUD();
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Stars
  for (let i = stars.length - 1; i >= 0; i--) {
    const s = stars[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.08; s.vx *= 0.97; s.life -= s.decay;
    if (s.life <= 0) stars.splice(i, 1);
  }

  // Ambient sparkles
  if (Math.random() < 0.08 + level * 0.01) {
    spawnStars(Math.random() * W, Math.random() * H, 1,
      goldRushActive ? '#ffffff' : '#ffd70055');
  }

  document.getElementById('powerFill').style.width = power + '%';
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('coins').textContent = coinCount;
  document.getElementById('level').textContent = level;
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function draw() {
  drawBg();
  coins.forEach(c => drawCoin(c));

  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = `hsl(${p.hue}, 100%, 60%)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  stars.forEach(s => {
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  drawRanger(player.x, player.y - 14, player.facing, player.walkFrame, goldRushActive);

  if (power >= 100 && !goldRushActive) {
    ctx.fillStyle = `rgba(255,215,0,${0.7 + 0.3 * Math.sin(frameCount * 0.2)})`;
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS SPACE / A BUTTON FOR GOLD RUSH!', W / 2, H - 8);
  }

  if (goldRushActive) {
    const pct = goldRushTimer / 300;
    ctx.fillStyle = 'rgba(255,215,0,0.25)';
    ctx.fillRect(0, H - 5, W * pct, 5);
    ctx.fillStyle = 'rgba(255,215,0,0.7)';
    ctx.fillRect(0, H - 5, W * pct, 3);
  }
}

// ─── Loop ────────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  updateHUD();
  requestAnimationFrame(loop);
}

// ─── Input ───────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
  resumeAudio();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

loop();
</script>
</body>
</html>
